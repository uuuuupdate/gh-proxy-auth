name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Copy frontend to embed directory
        run: |
          rm -rf internal/frontend/dist
          cp -r web/dist internal/frontend/dist

      - name: Build binary (linux/amd64)
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o gh-proxy-auth-linux-amd64 .

      - name: Install arm64 cross-compilation toolchain
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary (linux/arm64)
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: arm64
          CC: aarch64-linux-gnu-gcc
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o gh-proxy-auth-linux-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gh-proxy-auth-linux-amd64
            gh-proxy-auth-linux-arm64
          generate_release_notes: true
